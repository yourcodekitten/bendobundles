<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges" role="img" aria-label="bendobundles">
  <!-- the LCD screen tile (room olive) -->
  <rect width="16" height="16" rx="3" fill="#d5da99"/>
  <!-- a wrapped gift: box + lid, dark olive -->
  <rect x="3" y="6" width="10" height="8" fill="#363f19"/>
  <rect x="2" y="5" width="12" height="2" fill="#2a320b"/>
  <!-- burgundy ribbon + bow — the act of giving -->
  <rect x="7" y="5" width="2" height="9" fill="#95255c"/>
  <rect x="5" y="3" width="2" height="2" fill="#95255c"/>
  <rect x="9" y="3" width="2" height="2" fill="#95255c"/>
  <rect x="7" y="4" width="2" height="1" fill="#95255c"/>
</svg>
