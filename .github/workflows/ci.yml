name: ci
on:
  pull_request:
  push:
    branches: [main]
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-latest
    services:
      dynamodb:
        image: amazon/dynamodb-local:2.5.2
        ports: ["8000:8000"]
    env:
      DYNAMODB_LOCAL_URL: http://localhost:8000
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      # step-security forks are the org pattern, but they hard-fail on PRIVATE repos without a
      # StepSecurity subscription (verified: run 2026-07-02, "requires a StepSecurity subscription
      # for private repositories"). Until this repo goes public (or gets a subscription), the
      # SHA-pinned upstreams stay. Swap back to step-security/* when visibility changes.
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
      - run: cargo fmt --check
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - run: cargo test --workspace
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
        working-directory: web
      - run: npm run lint
        working-directory: web
      - run: npm run typecheck
        working-directory: web
      - run: npm test -- --run
        working-directory: web
      - run: npm run build
        working-directory: web

  terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: "1.12.2"
      - run: terraform -chdir=terraform fmt -check -diff
      - run: terraform -chdir=terraform init -backend=false
      - run: terraform -chdir=terraform validate

  artifacts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
      - name: install cargo-lambda
        run: pip3 install cargo-lambda
      - run: |
          for bin in public-api admin-api fulfillment; do
            cargo lambda build --release --arm64 --output-format zip --bin "$bin"
          done
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci && npm run build
        working-directory: web
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: lambda-zips
          path: target/lambda/*/bootstrap.zip
          retention-days: 14
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: web-dist
          path: web/dist/
          retention-days: 14

  # Expected-usage cost estimate (org-module pattern, standalone body: the org
  # reusable carries step-security/harden-runner, which hard-fails on private
  # repos — same caveat as the comment on the test job). Gated on the
  # INFRACOST_API_KEY secret so CI stays green until it's configured; once set,
  # the job posts/updates a cost comment on PRs.
  infracost:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: gate on API key
        id: gate
        env:
          INFRACOST_API_KEY: ${{ secrets.INFRACOST_API_KEY }}
        run: |
          if [ -n "$INFRACOST_API_KEY" ]; then
            echo "has_key=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::INFRACOST_API_KEY not set — skipping cost estimate"
            echo "has_key=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: infracost/actions/setup@d51fc54d23c9ad90f984b884257bd96dc2625067 # v4.1.0
        if: steps.gate.outputs.has_key == 'true'
        with:
          api-key: ${{ secrets.INFRACOST_API_KEY }}
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        if: steps.gate.outputs.has_key == 'true'
        with:
          persist-credentials: false
      - name: cost breakdown
        if: steps.gate.outputs.has_key == 'true'
        run: |
          infracost breakdown --config-file=infracost.yml --format=table
          infracost breakdown --config-file=infracost.yml --format=json --out-file=/tmp/infracost.json
      - name: post cost comment
        if: steps.gate.outputs.has_key == 'true' && github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          infracost comment github --path=/tmp/infracost.json \
            --repo="$GITHUB_REPOSITORY" \
            --pull-request="${{ github.event.pull_request.number }}" \
            --github-token="$GITHUB_TOKEN" \
            --behavior=update
